name: Update Letta Code version

on:
  workflow_dispatch:
  schedule:
    # Turn npm releases into Git commits so Railway services connected to this
    # repo can auto-deploy from the main branch.
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest="$(npm view @letta-ai/letta-code version)"
          current="$(tr -d '[:space:]' < letta-code-version.txt)"

          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

          if [[ "$latest" == "$current" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$latest" > letta-code-version.txt
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add letta-code-version.txt
          git commit -m "$(cat <<EOF
          chore: bump letta-code to v${{ steps.version.outputs.latest }}

          \"Simplicity is prerequisite for reliability.\" — Edsger W. Dijkstra

          Written by Cameron ◯ Letta Code
          EOF
          )"
          git push
